---
- name: Set Memos state fact
  ansible.builtin.set_fact:
    memos_state: "{{ 'present' if memos_enabled else 'absent' }}"

- name: Build Memos
  include_role:
    name: nix_build
  vars:
    nix_build_attr: nixpkgs#memos
    nix_build_out: /opt/memos
    nix_build_state: "{{ memos_state }}"

- name: Create s6 service
  include_role:
    name: s6_service
  vars:
    s6_service_name: memos
    s6_service_command: "exec /opt/memos/bin/memos"
    s6_service_env:
      MEMOS_DATA: "{{ memos_data_dir }}"
      MEMOS_PORT: "{{ memos_port }}"
    s6_service_state: "{{ memos_state }}"

